<div class="toast-container" aria-live="polite" aria-atomic="false">
  @for (toast of toasts(); track toast._id) {
    <div class="toast" [class.toast--success]="toast.severity === 'success'"
         [class.toast--error]="toast.severity === 'error'"
         [@slideIn]>
      <div class="toast__accent"></div>

      <div class="toast__icon-wrap">
        @if (toast.severity === 'success') {
          <i class="icon icon--md icon--check" aria-hidden="true"></i>
        } @else {
          <span class="toast__exclaim" aria-hidden="true">!</span>
        }
      </div>

      <div class="toast__body">
        <p class="toast__summary">{{ toast.summary }}</p>
        @if (toast.detail) {
          <p class="toast__detail">{{ toast.detail }}</p>
        }
      </div>

      <button class="toast__close" (click)="remove(toast._id)" aria-label="Dismiss notification">
        &times;
      </button>
    </div>
  }
</div>
