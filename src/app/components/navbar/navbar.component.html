<nav class="navbar" [ngClass]="{ scrolled: scrollService.isScrolled() }" @slideInNav>
  <div class="container navbar__inner">
    <a class="navbar__logo" (click)="navigate('hero')">
      <span class="logo-bracket">&lt;</span>
      <span class="logo-text">Dev</span>
      <span class="logo-dot">.</span>
      <span class="logo-text">Portfolio</span>
      <span class="logo-bracket">/&gt;</span>
    </a>

    <ul class="navbar__links" [ngClass]="{ active: mobileOpen() }">
      @for (link of dataService.navLinks; track link.sectionId) {
        <li>
          <a
            class="navbar__link"
            [ngClass]="{ active: isHomePage() && scrollService.activeSection() === link.sectionId }"
            (click)="navigate(link.sectionId)">
            {{ link.label }}
          </a>
        </li>
      }
      <li class="navbar__link-divider"></li>
      <li>
        <a class="navbar__link navbar__link--route" routerLink="/blog" (click)="mobileOpen.set(false)" [ngClass]="{ active: !isHomePage() }">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
          </svg>
          Blog
        </a>
      </li>
    </ul>

    <div class="navbar__actions">
      <button class="theme-toggle" (click)="themeService.toggleTheme()" aria-label="Toggle theme">
        @if (themeService.isDark()) {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
          </svg>
        }
      </button>

      <button class="navbar__hamburger" [ngClass]="{ active: mobileOpen() }" (click)="toggleMobile()" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</nav>
