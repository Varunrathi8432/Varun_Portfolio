<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="10%" cy="90%" r="45%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#00b894;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="90%" cy="80%" r="45%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glowLeft)"/>
  <rect width="800" height="500" fill="url(#glowRight)"/>

  <!-- ===== NAVBAR ===== -->
  <rect x="0" y="0" width="800" height="48" fill="#0a0a12" opacity="0.95"/>
  <!-- Logo -->
  <text x="24" y="30" font-family="monospace" font-size="13" font-weight="700" fill="#f1c40f">&lt;</text>
  <text x="33" y="30" font-family="monospace" font-size="13" font-weight="700" fill="white">Dev.</text>
  <text x="68" y="30" font-family="monospace" font-size="13" font-weight="700" fill="white">Portfolio</text>
  <text x="130" y="30" font-family="monospace" font-size="13" font-weight="700" fill="#f1c40f">/&gt;</text>
  <!-- Home pill -->
  <rect x="250" y="14" width="46" height="20" rx="10" fill="url(#btnGrad)" opacity="0.9"/>
  <text x="273" y="28" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">Home</text>
  <!-- Nav links -->
  <text x="308" y="28" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#9ca3af">About</text>
  <text x="352" y="28" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#9ca3af">Skills</text>
  <text x="393" y="28" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#9ca3af">Projects</text>
  <text x="444" y="28" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#9ca3af">Experience</text>
  <text x="510" y="28" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#9ca3af">Testimonials</text>
  <text x="574" y="28" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#9ca3af">Contact</text>
  <!-- Theme toggle -->
  <circle cx="756" cy="24" r="12" fill="#1a1a2e" stroke="#4b5563" stroke-width="1"/>
  <text x="756" y="28" font-family="monospace" font-size="11" fill="#f9fafb" text-anchor="middle">☀</text>

  <!-- ===== HERO LEFT ===== -->
  <!-- "Hello, I'm" line -->
  <line x1="24" y1="90" x2="58" y2="90" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="66" y="94" font-family="monospace" font-size="11" fill="#06b6d4" letter-spacing="1"> Hello, I'm</text>

  <!-- "Varun" -->
  <text x="24" y="160" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="900" fill="white">Varun</text>

  <!-- "Developer" gradient -->
  <text x="24" y="220" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="900" fill="url(#nameGrad)">Developer</text>

  <!-- "> Frontend Engineer |" -->
  <text x="24" y="255" font-family="monospace" font-size="12" fill="#10b981">&gt; Frontend Engineer </text>
  <rect x="210" y="242" width="2" height="16" fill="#10b981" opacity="0.9"/>

  <!-- Description -->
  <text x="24" y="278" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" fill="#9ca3af">Frontend developer specializing in building modern,</text>
  <text x="24" y="293" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" fill="#9ca3af">responsive web applications with clean architecture.</text>

  <!-- Buttons -->
  <rect x="24" y="310" width="118" height="34" rx="17" fill="url(#btnGrad)"/>
  <text x="83" y="332" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">⊞ View Projects</text>

  <rect x="152" y="310" width="124" height="34" rx="17" fill="#1a1a2e" stroke="#4b5563" stroke-width="1"/>
  <text x="214" y="332" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="white" text-anchor="middle">↓ Download Resume</text>

  <rect x="286" y="310" width="100" height="34" rx="17" fill="#1a1a2e" stroke="#4b5563" stroke-width="1"/>
  <text x="336" y="332" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="white" text-anchor="middle">✉ Contact Me</text>

  <!-- Social icons -->
  <circle cx="40" cy="384" r="14" fill="#1a1a2e" stroke="#374151" stroke-width="1"/>
  <text x="40" y="389" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">GH</text>
  <circle cx="76" cy="384" r="14" fill="#1a1a2e" stroke="#374151" stroke-width="1"/>
  <text x="76" y="389" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">in</text>
  <circle cx="112" cy="384" r="14" fill="#1a1a2e" stroke="#374151" stroke-width="1"/>
  <text x="112" y="389" font-family="monospace" font-size="11" fill="#d1d5db" text-anchor="middle">𝕏</text>

  <!-- Scroll indicator -->
  <rect x="386" y="442" width="18" height="28" rx="9" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <circle cx="395" cy="452" r="3" fill="#6b7280"/>
  <text x="395" y="490" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Scroll to explore</text>

  <!-- ===== HERO RIGHT: CODE EDITOR ===== -->
  <rect x="430" y="62" width="342" height="380" rx="14" fill="#111827" stroke="#374151" stroke-width="1"/>
  <!-- Editor title bar -->
  <rect x="430" y="62" width="342" height="40" rx="14" fill="#1f2937"/>
  <rect x="430" y="88" width="342" height="14" fill="#1f2937"/>
  <!-- Traffic lights -->
  <circle cx="456" cy="82" r="6" fill="#ef4444"/>
  <circle cx="476" cy="82" r="6" fill="#f59e0b"/>
  <circle cx="496" cy="82" r="6" fill="#22c55e"/>
  <!-- Filename -->
  <text x="520" y="87" font-family="monospace" font-size="11" fill="#9ca3af">developer.ts</text>

  <!-- Code content -->
  <text x="452" y="128" font-family="monospace" font-size="11" fill="#10b981">const</text>
  <text x="498" y="128" font-family="monospace" font-size="11" fill="#e2e8f0"> developer</text>
  <text x="576" y="128" font-family="monospace" font-size="11" fill="#10b981"> =</text>
  <text x="592" y="128" font-family="monospace" font-size="11" fill="#e2e8f0"> &#123;</text>

  <text x="468" y="150" font-family="monospace" font-size="11" fill="#93c5fd">  name:</text>
  <text x="520" y="150" font-family="monospace" font-size="11" fill="#fcd34d"> 'Varun',</text>

  <text x="468" y="170" font-family="monospace" font-size="11" fill="#93c5fd">  role:</text>
  <text x="516" y="170" font-family="monospace" font-size="11" fill="#fcd34d"> 'Frontend Developer',</text>

  <text x="468" y="190" font-family="monospace" font-size="11" fill="#93c5fd">  experience:</text>
  <text x="572" y="190" font-family="monospace" font-size="11" fill="#fcd34d"> '1+ year',</text>

  <text x="468" y="210" font-family="monospace" font-size="11" fill="#93c5fd">  skills: [</text>

  <text x="484" y="230" font-family="monospace" font-size="11" fill="#fcd34d">    'Angular',</text>
  <text x="562" y="230" font-family="monospace" font-size="11" fill="#fcd34d"> 'TypeScript',</text>

  <text x="484" y="250" font-family="monospace" font-size="11" fill="#fcd34d">    'RxJs',</text>
  <text x="542" y="250" font-family="monospace" font-size="11" fill="#fcd34d"> 'SCSS'</text>

  <text x="468" y="270" font-family="monospace" font-size="11" fill="#93c5fd">  ],</text>

  <text x="468" y="290" font-family="monospace" font-size="11" fill="#93c5fd">  passion:</text>
  <text x="543" y="290" font-family="monospace" font-size="11" fill="#fcd34d"> 'Building great UIs',</text>

  <text x="468" y="310" font-family="monospace" font-size="11" fill="#93c5fd">  available:</text>
  <text x="556" y="310" font-family="monospace" font-size="11" fill="#a78bfa"> true</text>
  <text x="594" y="310" font-family="monospace" font-size="11" fill="#6b7280"> // let's talk!</text>

  <text x="452" y="332" font-family="monospace" font-size="11" fill="#e2e8f0">&#125;;</text>
</svg>
